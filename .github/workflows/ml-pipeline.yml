name: ML Model CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linter Check
        run: |
          pip install flake8
          flake8 . --ignore=E501,F401,F841,E302,E305,E127,E128

      - name: Model Dry Test
        run: |
          python -c "import tensorflow as tf; print('TensorFlow environment ready!')"

      - name: Upload Project Documentation
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md